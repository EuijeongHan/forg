services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: forg
      POSTGRES_PASSWORD: forg1234
      POSTGRES_DB: forg
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./app:/app

volumes:
  postgres_data:
